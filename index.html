<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="字詞學習">
    <meta name="theme-color" content="#FFF0F5">
    <meta name="format-detection" content="telephone=no">
    <title>🌸 小公主字詞學習</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-text-size-adjust: 100%;
        }

        html {
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang HK', sans-serif;
            background: linear-gradient(180deg, #FFF0F5 0%, #FFE4EC 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding: 12px;
            padding-top: env(safe-area-inset-top, 12px);
            padding-bottom: calc(env(safe-area-inset-bottom, 12px) + 12px);
            overscroll-behavior: none;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 標題 */
        .header {
            text-align: center;
            padding: 8px 0;
            margin-bottom: 12px;
        }

        .header-icons {
            font-size: 1.6em;
            margin-bottom: 5px;
        }

        .header h1 {
            font-size: 1.4em;
            color: #E91E8C;
            font-weight: 600;
        }

        /* 統計列 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stats {
            color: #E91E8C;
            font-size: 1.05em;
            font-weight: 500;
            background: white;
            padding: 10px 14px;
            border-radius: 14px;
            border: 2px solid #FFB6C1;
        }

        .btn-clear {
            background: #FF69B4;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            -webkit-appearance: none;
        }

        .btn-clear:active {
            background: #FF1493;
            transform: scale(0.97);
        }

        /* 模式切換 */
        .mode-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            min-height: 52px;
            -webkit-appearance: none;
            background: white;
            color: #E91E8C;
            border: 2px solid #FFB6C1;
        }

        .mode-btn.active {
            background: #FF69B4;
            color: white;
            border-color: #FF69B4;
        }

        .mode-btn:active {
            transform: scale(0.97);
        }

        /* 輸入區域 */
        .input-section {
            background: white;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #FFB6C1;
        }

        .input-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .input-tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            -webkit-appearance: none;
            background: #FFF0F5;
            color: #E91E8C;
            border: 2px solid #FFB6C1;
        }

        .input-tab.active {
            background: #FF69B4;
            color: white;
            border-color: #FF69B4;
        }

        .input-panel {
            display: none;
        }

        .input-panel.active {
            display: block;
        }

        .input-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .input-group input,
        .input-group textarea {
            flex: 1;
            min-width: 0;
            padding: 14px;
            border: 2px solid #FFB6C1;
            border-radius: 14px;
            font-size: 1.2em;
            outline: none;
            background: #FFF8FA;
            font-family: inherit;
            color: #4A4A4A;
            -webkit-appearance: none;
        }

        .input-group textarea {
            width: 100%;
            height: 130px;
            resize: none;
            line-height: 1.5;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #FF69B4;
            background: white;
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: #CE93D8;
        }

        /* 按鈕 */
        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            min-height: 48px;
            -webkit-appearance: none;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-add {
            background: #FF69B4;
            color: white;
            padding: 14px 24px;
        }

        .btn-add:active {
            background: #FF1493;
        }

        .btn-primary {
            background: #FF69B4;
            color: white;
        }

        .btn-primary:active {
            background: #FF1493;
        }

        .btn-secondary {
            background: #9C27B0;
            color: white;
        }

        .btn-danger {
            background: #F06292;
            color: white;
        }

        .btn-speak {
            background: #AB47BC;
            color: white;
        }

        .btn-small {
            padding: 10px 14px;
            font-size: 1em;
            min-height: 42px;
        }

        /* 隨機展示區域 */
        .random-display {
            display: none;
            text-align: center;
            padding: 20px 15px;
            background: white;
            border-radius: 20px;
            border: 3px solid #FFB6C1;
            margin-bottom: 10px;
        }

        .random-display.show {
            display: block;
        }

        .random-word-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }

        .random-word {
            font-size: 4.5em;
            color: #E91E8C;
            font-weight: 700;
            line-height: 1.2;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speak-btn-large {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: #AB47BC;
            color: white;
            font-size: 1.8em;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .speak-btn-large:active {
            background: #8E24AA;
            transform: scale(0.95);
        }

        .random-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 12px;
        }

        .random-controls .btn {
            padding: 16px 24px;
            font-size: 1.15em;
            min-height: 52px;
        }

        .swipe-hint {
            color: #E91E8C;
            font-size: 0.9em;
            margin-top: 12px;
            opacity: 0.8;
        }

        /* 卡片區域 */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }

        .word-card {
            background: white;
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            border: 2px solid #FFB6C1;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }

        .word-card:active {
            background: #FFF0F5;
            transform: scale(0.97);
        }

        .word-text {
            font-size: 1.8em;
            color: #E91E8C;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .card-actions .btn-small {
            padding: 8px 12px;
            min-width: 44px;
        }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 35px 15px;
            color: #E91E8C;
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            font-size: 3.5em;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 1.15em;
            line-height: 1.5;
        }

        /* 模態框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 245, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 22px;
            border-radius: 20px;
            border: 3px solid #FFB6C1;
            max-width: 90%;
            width: 320px;
            text-align: center;
        }

        .modal-content h3 {
            color: #E91E8C;
            margin-bottom: 14px;
            font-size: 1.3em;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            border: 2px solid #FFB6C1;
            border-radius: 14px;
            font-size: 1.2em;
            margin-bottom: 16px;
            outline: none;
            font-family: inherit;
            text-align: center;
            -webkit-appearance: none;
        }

        .modal-content input:focus {
            border-color: #FF69B4;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-buttons .btn {
            min-width: 90px;
            flex: 1;
        }

        .modal-buttons .btn-save {
            flex: 2;
            background: #FF69B4;
        }

        .confirm-modal p {
            color: #4A4A4A;
            font-size: 1.1em;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 20px) + 25px);
            left: 50%;
            transform: translateX(-50%);
            background: #E91E8C;
            color: white;
            padding: 12px 22px;
            border-radius: 16px;
            opacity: 0;
            z-index: 2000;
            font-size: 1em;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        /* 提示文字 */
        .hint {
            text-align: center;
            color: #E91E8C;
            font-size: 0.9em;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        /* 響應式 */
        @media (max-width: 400px) {
            .header h1 {
                font-size: 1.2em;
            }

            .input-group {
                flex-direction: column;
            }

            .random-word {
                font-size: 3.8em;
            }

            .word-text {
                font-size: 1.6em;
            }

            .stats-bar {
                flex-direction: column;
            }

            .btn-clear {
                width: 100%;
            }

            .speak-btn-large {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 標題 -->
        <div class="header">
            <div class="header-icons">🌸 🦋 🌸</div>
            <h1>小公主字詞學習</h1>
        </div>

        <!-- 統計列 -->
        <div class="stats-bar">
            <div class="stats">📚 共 <strong id="wordCount">0</strong> 個生字</div>
            <button class="btn-clear" onclick="openDeleteAllModal()">🗑️ 刪除全部</button>
        </div>

        <!-- 模式切換 -->
        <div class="mode-bar">
            <button class="mode-btn active" id="manualMode" onclick="setMode('manual')">📋 瀏覽</button>
            <button class="mode-btn" id="randomMode" onclick="setMode('random')">🎲 學習</button>
        </div>

        <!-- 輸入區域 -->
        <div class="input-section" id="inputSection">
            <div class="input-tabs">
                <button class="input-tab active" id="singleTab" onclick="setInputTab('single')">單個新增</button>
                <button class="input-tab" id="batchTab" onclick="setInputTab('batch')">批量新增</button>
            </div>

            <!-- 單個輸入 -->
            <div class="input-panel active" id="singlePanel">
                <div class="input-group">
                    <input type="text" id="wordInput" placeholder="輸入生字..." maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="off">
                    <button class="btn btn-add" onclick="addWord()">➕ 新增</button>
                </div>
            </div>

            <!-- 批量輸入 -->
            <div class="input-panel" id="batchPanel">
                <textarea id="batchInput" placeholder="輸入多個生字（每行一個或用逗號分隔）"></textarea>
                <div style="margin-top: 8px;">
                    <button class="btn btn-add" onclick="addBatchWords()" style="width: 100%;">➕ 新增</button>
                </div>
            </div>
        </div>

        <!-- 隨機展示區域 -->
        <div class="random-display" id="randomDisplay">
            <div class="random-word-area">
                <div class="random-word" id="randomWord">-</div>
                <button class="speak-btn-large" onclick="speakCurrentWord()">🔊</button>
            </div>
            <div class="random-controls">
                <button class="btn btn-secondary" onclick="prevRandom()">⬅️ 上一個</button>
                <button class="btn btn-primary" onclick="nextRandom()">下一個 ➡️</button>
            </div>
            <div class="swipe-hint">💡 左右滑動切換生字</div>
        </div>

        <!-- 卡片區域 -->
        <p class="hint" id="quickHint">💡 點擊生字可修改或刪除</p>
        <div class="cards-container" id="cardsContainer">
            <div class="empty-state">
                <div class="icon">🎈</div>
                <p>還沒有生字<br>快來新增吧！</p>
            </div>
        </div>
    </div>

    <!-- 修改模態框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>✏️ 修改生字</h3>
            <input type="text" id="editInput" maxlength="20" autocomplete="off">
            <div class="modal-buttons" style="flex-direction: column; gap: 10px;">
                <button class="btn btn-primary btn-save" onclick="saveEdit()" style="width: 100%; flex: none;">✅ 完成</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="closeEditModal()" style="flex: 1;">取消</button>
                    <button class="btn btn-danger" onclick="openDeleteConfirmModal()" style="flex: 1;">🗑️ 刪除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 刪除確認模態框 -->
    <div class="modal confirm-modal" id="deleteConfirmModal">
        <div class="modal-content">
            <h3>🗑️ 確定刪除？</h3>
            <p>確定要刪除「<span id="deleteWordName"></span>」嗎？</p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeDeleteConfirmModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDeleteWord()">確定刪除</button>
            </div>
        </div>
    </div>

    <!-- 刪除全部確認 -->
    <div class="modal confirm-modal" id="deleteAllModal">
        <div class="modal-content">
            <h3>🗑️ 刪除全部？</h3>
            <p>確定要刪除所有生字嗎？</p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeDeleteAllModal()">取消</button>
                <button class="btn btn-danger" onclick="deleteAllWords()">確定刪除</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 資料變數
        var words = [];
        var wordStats = {};
        var currentMode = 'manual';
        var editingIndex = -1;
        var currentRandomIndex = -1;
        var touchStartX = 0;
        var touchEndX = 0;
        var cantoneseVoice = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderCards();
            updateStats();
            setupEvents();
            loadVoices();
        });

        // 載入資料
        function loadData() {
            try {
                var savedWords = localStorage.getItem('lw');
                var savedStats = localStorage.getItem('ls');
                words = savedWords ? JSON.parse(savedWords) : [];
                wordStats = savedStats ? JSON.parse(savedStats) : {};
            } catch(e) {
                words = [];
                wordStats = {};
            }
        }

        // 事件設定
        function setupEvents() {
            // Enter 鍵新增生字
            document.getElementById('wordInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addWord();
            });

            // Enter 鍵儲存編輯
            document.getElementById('editInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') saveEdit();
            });

            // 滑動切換
            setupSwipe(document.getElementById('randomDisplay'));

            // 點擊模態框背景關閉
            document.querySelectorAll('.modal').forEach(function(m) {
                m.addEventListener('click', function(e) {
                    if (e.target === m) {
                        m.classList.remove('show');
                    }
                });
            });
        }

        // 語音設定
        function loadVoices() {
            if (!('speechSynthesis' in window)) return;
            
            function setVoice() {
                var voices = speechSynthesis.getVoices();
                cantoneseVoice = voices.find(function(v) {
                    return v.lang.indexOf('zh-HK') !== -1 || v.lang.indexOf('zh_HK') !== -1;
                });
            }
            
            setVoice();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = setVoice;
            }
        }

        // 輸入標籤頁切換
        function setInputTab(tab) {
            var tabs = document.querySelectorAll('.input-tab');
            var panels = document.querySelectorAll('.input-panel');
            
            tabs.forEach(function(t) { t.classList.remove('active'); });
            panels.forEach(function(p) { p.classList.remove('active'); });
            
            if (tab === 'single') {
                document.getElementById('singleTab').classList.add('active');
                document.getElementById('singlePanel').classList.add('active');
            } else {
                document.getElementById('batchTab').classList.add('active');
                document.getElementById('batchPanel').classList.add('active');
            }
        }

        // 單個新增
        function addWord() {
            var input = document.getElementById('wordInput');
            var word = input.value.trim();

            if (!word) {
                showToast('請輸入生字');
                return;
            }

            if (words.indexOf(word) !== -1) {
                showToast('這個生字已存在');
                return;
            }

            words.push(word);
            wordStats[word] = 0;
            save();
            input.value = '';
            renderCards();
            updateStats();
            showToast('新增成功！');
        }

        // 批量新增
        function addBatchWords() {
            var textarea = document.getElementById('batchInput');
            var text = textarea.value.trim();

            if (!text) {
                showToast('請輸入生字');
                return;
            }

            var newWords = text.split(/[\n,，、\s]+/)
                .map(function(w) { return w.trim(); })
                .filter(function(w) { return w.length > 0; });

            if (newWords.length === 0) {
                showToast('沒有有效的生字');
                return;
            }

            var added = 0;
            var duplicate = 0;

            newWords.forEach(function(word) {
                if (words.indexOf(word) === -1) {
                    words.push(word);
                    wordStats[word] = 0;
                    added++;
                } else {
                    duplicate++;
                }
            });

            save();
            textarea.value = '';
            renderCards();
            updateStats();

            if (duplicate > 0) {
                showToast('新增 ' + added + ' 個，' + duplicate + ' 個重複');
            } else {
                showToast('新增 ' + added + ' 個生字！');
            }
        }

        // 模式切換
        function setMode(mode) {
            currentMode = mode;
            
            document.getElementById('manualMode').classList.toggle('active', mode === 'manual');
            document.getElementById('randomMode').classList.toggle('active', mode === 'random');

            if (mode === 'random') {
                document.getElementById('randomDisplay').classList.add('show');
                document.getElementById('cardsContainer').style.display = 'none';
                document.getElementById('quickHint').style.display = 'none';
                document.getElementById('inputSection').style.display = 'none';
                nextRandom();
            } else {
                document.getElementById('randomDisplay').classList.remove('show');
                document.getElementById('cardsContainer').style.display = 'grid';
                document.getElementById('quickHint').style.display = 'block';
                document.getElementById('inputSection').style.display = 'block';
            }
        }

        // 滑動手勢
        function setupSwipe(element) {
            element.addEventListener('touchstart', function(e) {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            element.addEventListener('touchend', function(e) {
                touchEndX = e.changedTouches[0].screenX;
                var diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        nextRandom();
                    } else {
                        prevRandom();
                    }
                }
            }, { passive: true });
        }

        // 下一個隨機生字
        function nextRandom() {
            if (words.length === 0) {
                document.getElementById('randomWord').textContent = '無生字';
                currentRandomIndex = -1;
                return;
            }

            if (words.length === 1) {
                currentRandomIndex = 0;
            } else {
                // 加權隨機：展示次數少的優先
                var weights = words.map(function(w) { 
                    return 1 / ((wordStats[w] || 0) + 1); 
                });
                var total = weights.reduce(function(a, b) { return a + b; }, 0);
                var r = Math.random() * total;
                
                for (var i = 0; i < weights.length; i++) {
                    r -= weights[i];
                    if (r <= 0) {
                        currentRandomIndex = i;
                        break;
                    }
                }
            }

            var word = words[currentRandomIndex];
            wordStats[word] = (wordStats[word] || 0) + 1;
            save();
            document.getElementById('randomWord').textContent = word;
        }

        // 上一個隨機生字
        function prevRandom() {
            if (words.length === 0) return;
            
            currentRandomIndex = (currentRandomIndex - 1 + words.length) % words.length;
            document.getElementById('randomWord').textContent = words[currentRandomIndex];
        }

        // 發音
        function speakWord(word) {
            if (!word || !('speechSynthesis' in window)) return;
            
            speechSynthesis.cancel();
            var utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'zh-HK';
            utterance.rate = 0.75;
            utterance.pitch = 1.15;
            
            if (cantoneseVoice) {
                utterance.voice = cantoneseVoice;
            }
            
            speechSynthesis.speak(utterance);
        }

        function speakCurrentWord() {
            var word = document.getElementById('randomWord').textContent;
            if (word && word !== '無生字' && word !== '-') {
                speakWord(word);
            }
        }

        // 渲染卡片
        function renderCards() {
            var container = document.getElementById('cardsContainer');

            if (words.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">🎈</div><p>還沒有生字<br>快來新增吧！</p></div>';
                return;
            }

            var html = '';
            words.forEach(function(word, index) {
                // 轉義特殊字元
                var escapedWord = word.replace(/'/g, "\\'").replace(/"/g, '\\"');
                html += '<div class="word-card" onclick="openEditModal(' + index + ')">';
                html += '<div class="word-text">' + escapeHtml(word) + '</div>';
                html += '<div class="card-actions">';
                html += '<button class="btn btn-speak btn-small" onclick="event.stopPropagation(); speakWord(\'' + escapedWord + '\')">🔊</button>';
                html += '</div></div>';
            });
            container.innerHTML = html;
        }

        // HTML 轉義
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 更新統計
        function updateStats() {
            document.getElementById('wordCount').textContent = words.length;
        }

        // 儲存資料
        function save() {
            try {
                localStorage.setItem('lw', JSON.stringify(words));
                localStorage.setItem('ls', JSON.stringify(wordStats));
            } catch(e) {
                console.log('儲存失敗', e);
            }
        }

        // 開啟編輯模態框
        function openEditModal(index) {
            editingIndex = index;
            document.getElementById('editInput').value = words[index];
            document.getElementById('editModal').classList.add('show');
            setTimeout(function() {
                document.getElementById('editInput').focus();
            }, 100);
        }

        // 關閉編輯模態框
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingIndex = -1;
        }

        // 儲存編輯
        function saveEdit() {
            if (editingIndex < 0 || editingIndex >= words.length) {
                closeEditModal();
                return;
            }

            var newWord = document.getElementById('editInput').value.trim();
            
            if (!newWord) {
                showToast('不能空白');
                return;
            }
            
            if (words.indexOf(newWord) !== -1 && words[editingIndex] !== newWord) {
                showToast('這個生字已存在');
                return;
            }

            var oldWord = words[editingIndex];
            var count = wordStats[oldWord] || 0;
            
            words[editingIndex] = newWord;
            delete wordStats[oldWord];
            wordStats[newWord] = count;

            save();
            renderCards();
            closeEditModal();
            showToast('修改成功！');
        }

        // 開啟刪除確認
        function openDeleteConfirmModal() {
            if (editingIndex < 0 || editingIndex >= words.length) return;
            
            document.getElementById('deleteWordName').textContent = words[editingIndex];
            document.getElementById('deleteConfirmModal').classList.add('show');
        }

        // 關閉刪除確認
        function closeDeleteConfirmModal() {
            document.getElementById('deleteConfirmModal').classList.remove('show');
        }

        // 確認刪除單個生字
        function confirmDeleteWord() {
            if (editingIndex < 0 || editingIndex >= words.length) {
                closeDeleteConfirmModal();
                closeEditModal();
                return;
            }

            var word = words[editingIndex];
            words.splice(editingIndex, 1);
            delete wordStats[word];
            
            save();
            renderCards();
            updateStats();
            closeDeleteConfirmModal();
            closeEditModal();
            showToast('刪除成功！');

            // 如果在學習模式，顯示下一個
            if (currentMode === 'random') {
                nextRandom();
            }
            
            editingIndex = -1;
        }

        // 開啟刪除全部確認
        function openDeleteAllModal() {
            if (words.length === 0) {
                showToast('沒有生字');
                return;
            }
            document.getElementById('deleteAllModal').classList.add('show');
        }

        // 關閉刪除全部確認
        function closeDeleteAllModal() {
            document.getElementById('deleteAllModal').classList.remove('show');
        }

        // 刪除全部生字
        function deleteAllWords() {
            words = [];
            wordStats = {};
            currentRandomIndex = -1;
            editingIndex = -1;
            
            save();
            renderCards();
            updateStats();
            closeDeleteAllModal();
            
            if (currentMode === 'random') {
                document.getElementById('randomWord').textContent = '無生字';
            }
            
            showToast('已刪除全部！');
        }

        // 顯示 Toast
        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(function() {
                toast.classList.remove('show');
            }, 1500);
        }
    </script>
</body>
</html>
